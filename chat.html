<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>智能销售终端</title>
  <!-- Coze Web SDK 官方稳定版 -->
  <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.19/libs/cn/index.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: "Microsoft YaHei", sans-serif;
      background-color: #000;
    }

    /* 背景视频 */
    #bgVideo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* Coze容器 */
    #coze-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
    }

    /* 强制Coze全屏铺满 */
    .coze-chat-widget {
      width: 100vw !important;
      height: 100vh !important;
      max-width: 100vw !important;
      max-height: 100vh !important;
      top: 0 !important;
      right: 0 !important;
      border-radius: 0 !important;
    }
    /* 隐藏关闭按钮和悬浮球，适配无人值守 */
    .coze-chat-header-close { display: none !important; }
    .coze-chat-asst-btn { display: none !important; }

    /* 状态提示条 */
    #statusTip {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      background: rgba(0,0,0,0.75);
      color: #fff;
      border-radius: 24px;
      font-size: 14px;
      z-index: 9999;
      max-width: 90%;
      text-align: center;
      transition: opacity 0.3s;
    }
    .status-error {
      background: rgba(200, 0, 0, 0.8) !important;
    }
    .hide { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <video id="bgVideo" autoplay loop muted playsinline webkit-playsinline x5-playsinline x5-video-player-type="h5">
    <!-- 部署后替换为你的视频线上地址 -->
  </video>

  <div id="statusTip">系统启动中...</div>
  <div id="coze-container"></div>

  <script>
    /**************************
     * 配置区 - 批量生成仅修改此处
     **************************/
    const CONFIG = {
      coze: {
        bot_id: '7649074341644353582',
        token: 'pat_o2eWHvjE458IrbwJD6493Cn1bHrlupzK2w0QLnaKb4QExB8rYHqfmSUJE6A0whI5'
      },
      xunfei: {
        app_id: '37492c96',
        api_key: '4377ec3322ec3acb7247e80f686d27c5',
        api_secret: 'MTY5NjZmMzgxNWVlMTgyNGI1MGNhODI4',
        host: 'iat-api.xfyun.cn',
        path: '/v2/iat'
      },
      wake: {
        keywords: ['你好小玄', '你好小旋', '你好小璇', '你好小炫', '你好小选', '你好小轩'],
        coolDownTime: 5000,
        silenceTime: 1500
      },
      audio: {
        sampleRate: 16000,
        channelCount: 1
      }
    };

    /**************************
     * 全局变量
     **************************/
    let cozeClient = null;
    let ws = null;
    let mediaStream = null;
    let audioContext = null;
    let scriptProcessor = null;
    let isListening = false;
    let isConversing = false;
    let silenceTimer = null;
    let finalText = '';
    const statusTip = document.getElementById('statusTip');

    /**************************
     * 纯JS内联HMAC-SHA256实现（零依赖，兼容所有环境）
     **************************/
    (function() {
      function add(x, y) {
        return ((x >>> 0) + (y >>> 0)) >>> 0;
      }
      function rotr(x, n) {
        return (x >>> n) | (x << (32 - n));
      }
      function ch(x, y, z) {
        return (x & y) ^ (~x & z);
      }
      function maj(x, y, z) {
        return (x & y) ^ (x & z) ^ (y & z);
      }
      function sigma0(x) {
        return rotr(x, 2) ^ rotr(x, 13) ^ rotr(x, 22);
      }
      function sigma1(x) {
        return rotr(x, 6) ^ rotr(x, 11) ^ rotr(x, 25);
      }
      function gamma0(x) {
        return rotr(x, 7) ^ rotr(x, 18) ^ (x >>> 3);
      }
      function gamma1(x) {
        return rotr(x, 17) ^ rotr(x, 19) ^ (x >>> 10);
      }

      const K = [
        0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
        0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
        0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
        0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
        0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
        0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
        0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
        0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
      ];

      function sha256(message) {
        const bytes = new TextEncoder().encode(message);
        const bitLen = bytes.length * 8;
        const blocks = [];
        for (let i = 0; i < bytes.length; i += 64) {
          const block = new Uint8Array(64);
          block.set(bytes.slice(i, i + 64));
          blocks.push(block);
        }

        const lastBlock = blocks.length ? blocks[blocks.length - 1] : new Uint8Array(64);
        const lastLen = bytes.length % 64;
        lastBlock[lastLen] = 0x80;

        if (lastLen >= 56) {
          blocks.push(new Uint8Array(64));
        }

        const finalBlock = blocks[blocks.length - 1];
        const view = new DataView(finalBlock.buffer);
        view.setUint32(56, Math.floor(bitLen / 0x100000000), false);
        view.setUint32(60, bitLen >>> 0, false);

        let h0 = 0x6a09e667, h1 = 0xbb67ae85, h2 = 0x3c6ef372, h3 = 0xa54ff53a;
        let h4 = 0x510e527f, h5 = 0x9b05688c, h6 = 0x1f83d9ab, h7 = 0x5be0cd19;

        for (const block of blocks) {
          const w = new Uint32Array(64);
          const bv = new DataView(block.buffer);
          for (let i = 0; i < 16; i++) {
            w[i] = bv.getUint32(i * 4, false);
          }
          for (let i = 16; i < 64; i++) {
            w[i] = add(add(gamma1(w[i-2]), w[i-7]), add(gamma0(w[i-15]), w[i-16]));
          }

          let a = h0, b = h1, c = h2, d = h3;
          let e = h4, f = h5, g = h6, h = h7;

          for (let i = 0; i < 64; i++) {
            const T1 = add(add(add(h, sigma1(e)), add(ch(e, f, g), K[i])), w[i]);
            const T2 = add(sigma0(a), maj(a, b, c));
            h = g; g = f; f = e; e = add(d, T1);
            d = c; c = b; b = a; a = add(T1, T2);
          }

          h0 = add(h0, a); h1 = add(h1, b); h2 = add(h2, c); h3 = add(h3, d);
          h4 = add(h4, e); h5 = add(h5, f); h6 = add(h6, g); h7 = add(h7, h);
        }

        const result = new Uint8Array(32);
        const rv = new DataView(result.buffer);
        rv.setUint32(0, h0, false);
        rv.setUint32(4, h1, false);
        rv.setUint32(8, h2, false);
        rv.setUint32(12, h3, false);
        rv.setUint32(16, h4, false);
        rv.setUint32(20, h5, false);
        rv.setUint32(24, h6, false);
        rv.setUint32(28, h7, false);
        return result;
      }

      function hmacSha256(message, key) {
        const msgBytes = new TextEncoder().encode(message);
        let keyBytes = new TextEncoder().encode(key);
        if (keyBytes.length > 64) {
          keyBytes = sha256(key);
        }
        const paddedKey = new Uint8Array(64);
        paddedKey.set(keyBytes);

        const oKeyPad = new Uint8Array(64);
        const iKeyPad = new Uint8Array(64);
        for (let i = 0; i < 64; i++) {
          oKeyPad[i] = paddedKey[i] ^ 0x5c;
          iKeyPad[i] = paddedKey[i] ^ 0x36;
        }

        const inner = new Uint8Array(64 + msgBytes.length);
        inner.set(iKeyPad);
        inner.set(msgBytes, 64);
        const innerHash = sha256(inner);

        const outer = new Uint8Array(64 + 32);
        outer.set(oKeyPad);
        outer.set(innerHash, 64);
        return sha256(outer);
      }

      function base64Encode(bytes) {
        let binary = '';
        for (let i = 0; i < bytes.length; i++) {
          binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary);
      }

      window.CryptoUtil = { hmacSha256, base64Encode };
    })();

    /**************************
     * 讯飞鉴权URL生成
     **************************/
    function generateAuthUrl() {
      const date = new Date().toUTCString();
      const signStr = `host: ${CONFIG.xunfei.host}\ndate: ${date}\nGET ${CONFIG.xunfei.path} HTTP/1.1`;
      const signBytes = CryptoUtil.hmacSha256(signStr, CONFIG.xunfei.api_secret);
      const signature = CryptoUtil.base64Encode(signBytes);
      
      const authOrigin = `api_key="${CONFIG.xunfei.api_key}", algorithm="hmac-sha256", headers="host date request-line", signature="${signature}"`;
      const authorization = CryptoUtil.base64Encode(new TextEncoder().encode(authOrigin));
      
      return `wss://${CONFIG.xunfei.host}${CONFIG.xunfei.path}?authorization=${encodeURIComponent(authorization)}&date=${encodeURIComponent(date)}&host=${CONFIG.xunfei.host}`;
    }

    /**************************
     * 启动主流程
     **************************/
    window.addEventListener('load', () => {
      // 1. 启动背景视频
      const bgVideo = document.getElementById('bgVideo');
      bgVideo.muted = true;
      bgVideo.play().catch(() => {
        document.addEventListener('touchstart', () => bgVideo.play(), { once: true });
      });

      // 2. 检测Coze SDK是否加载
      if (typeof CozeWebSDK === 'undefined') {
        showStatus('聊天组件加载失败，请检查网络', true);
        return;
      }

      // 3. 初始化Coze
      setTimeout(() => initCoze(), 1000);

      // 4. 启动语音监听
      setTimeout(() => startWakeUpListen(), 2500);
    });

    /**************************
     * Coze SDK 初始化（官方规范参数）
     **************************/
    function initCoze() {
      try {
        cozeClient = new CozeWebSDK.WebChatClient({
          config: {
            bot_id: CONFIG.coze.bot_id,
            isIframe: false,
          },
          auth: {
            type: 'token',
            token: CONFIG.coze.token,
            onRefreshToken: () => Promise.resolve(CONFIG.coze.token)
          },
          ui: {
            layout: 'mobile',
            asstBtn: { isNeed: false },
            title: '智能销售助手',
          },
          onLoad: () => {
            setTimeout(() => {
              cozeClient.showChatBot();
              showStatus('聊天界面已就绪');
            }, 500);
          },
          onError: (err) => {
            console.error('Coze SDK错误:', err);
            showStatus('聊天组件异常：' + (err.message || '未知错误'), true);
          }
        }, document.getElementById('coze-container'));
      } catch (e) {
        console.error('Coze初始化失败:', e);
        showStatus('聊天组件初始化失败：' + e.message, true);
      }
    }

    /**************************
     * 音频采集模块
     **************************/
    async function startAudioCapture() {
      try {
        if (!navigator.mediaDevices?.getUserMedia) {
          throw new Error('当前环境不支持音频采集');
        }
        mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            sampleRate: CONFIG.audio.sampleRate,
            channelCount: CONFIG.audio.channelCount,
            echoCancellation: true,
            noiseSuppression: true
          }
        });

        audioContext = new (window.AudioContext || window.webkitAudioContext)({
          sampleRate: CONFIG.audio.sampleRate
        });

        const source = audioContext.createMediaStreamSource(mediaStream);
        scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);
        source.connect(scriptProcessor);
        scriptProcessor.connect(audioContext.destination);

        scriptProcessor.onaudioprocess = (e) => {
          if (!isListening || ws?.readyState !== WebSocket.OPEN) return;
          const inputData = e.inputBuffer.getChannelData(0);
          const pcmData = floatTo16BitPCM(inputData);
          const base64 = arrayBufferToBase64(pcmData.buffer);
          sendAudioFrame(base64);
        };
        return true;
      } catch (err) {
        console.error('麦克风采集失败:', err);
        showStatus('麦克风启动失败：' + err.message, true);
        return false;
      }
    }

    function floatTo16BitPCM(input) {
      const output = new Int16Array(input.length);
      for (let i = 0; i < input.length; i++) {
        const s = Math.max(-1, Math.min(1, input[i]));
        output[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      return output;
    }

    function arrayBufferToBase64(buffer) {
      let binary = '';
      const bytes = new Uint8Array(buffer);
      for (let i = 0; i < bytes.byteLength; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary);
    }

    /**************************
     * 讯飞WebSocket连接
     **************************/
    function connectXunfei() {
      try {
        const wsUrl = generateAuthUrl();
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
          sendFirstFrame();
          isListening = true;
          showStatus('语音监听已启动，说「你好小玄」唤醒');
        };

        ws.onmessage = (event) => {
          try {
            const res = JSON.parse(event.data);
            if (res.code !== 0) {
              showStatus('识别错误：' + res.message, true);
              return;
            }
            if (res.data?.result?.ws) {
              let text = '';
              res.data.result.ws.forEach(item => text += item.cw[0].w);
              handleRecognitionResult(text, res.data.result.pgs === 'rpl');
            }
          } catch (e) {
            console.error('解析结果失败:', e);
          }
        };

        ws.onerror = () => {
          showStatus('语音连接异常，正在重连...');
        };

        ws.onclose = () => {
          isListening = false;
          if (!isConversing) {
            setTimeout(() => startWakeUpListen(), 3000);
          }
        };
      } catch (e) {
        console.error('连接失败:', e);
        showStatus('语音服务连接失败：' + e.message, true);
      }
    }

    function sendFirstFrame() {
      const frame = {
        common: { app_id: CONFIG.xunfei.app_id },
        business: {
          language: 'zh_cn',
          domain: 'iat',
          accent: 'mandarin',
          vad_eos: 2000
        },
        data: {
          status: 0,
          format: 'audio/L16;rate=16000',
          audio: ''
        }
      };
      ws.send(JSON.stringify(frame));
    }

    function sendAudioFrame(audioBase64) {
      ws.send(JSON.stringify({
        data: { status: 1, format: 'audio/L16;rate=16000', audio: audioBase64 }
      }));
    }

    function sendEndFrame() {
      if (ws?.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ data: { status: 2, audio: '' } }));
      }
    }

    /**************************
     * 唤醒匹配 + 对话逻辑
     **************************/
    function handleRecognitionResult(text, isReplace) {
      if (isConversing) {
        finalText = isReplace ? text : finalText + text;
        clearTimeout(silenceTimer);
        silenceTimer = setTimeout(endConversation, CONFIG.wake.silenceTime);
        return;
      }

      const match = CONFIG.wake.keywords.some(keyword => text.includes(keyword));
      if (match) wakeUpSuccess();
    }

    function wakeUpSuccess() {
      isConversing = true;
      finalText = '';
      showStatus('我在呢，请说话...');
      clearTimeout(silenceTimer);
      silenceTimer = setTimeout(endConversation, 3000);
    }

    function endConversation() {
      clearTimeout(silenceTimer);
      stopWakeUpListen();

      if (finalText.trim() && cozeClient) {
        cozeClient.sendMessage({
          content: finalText,
          contentType: 'text'
        });
      }

      setTimeout(() => {
        isConversing = false;
        finalText = '';
        startWakeUpListen();
      }, CONFIG.wake.coolDownTime);
    }

    /**************************
     * 监听启停 + 资源释放
     **************************/
    async function startWakeUpListen() {
      if (isListening) return;
      showStatus('正在启动语音监听...');
      const ok = await startAudioCapture();
      if (ok) connectXunfei();
    }

    function stopWakeUpListen() {
      isListening = false;
      if (ws) { sendEndFrame(); ws.close(); ws = null; }
      if (mediaStream) {
        mediaStream.getAudioTracks().forEach(track => {
          track.stop();
          mediaStream.removeTrack(track);
        });
        mediaStream = null;
      }
      if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor = null; }
      if (audioContext) { audioContext.close(); audioContext = null; }
    }

    /**************************
     * 工具函数
     **************************/
    function showStatus(text, isError = false) {
      statusTip.textContent = text;
      statusTip.classList.remove('hide');
      statusTip.classList.toggle('status-error', isError);
      clearTimeout(statusTip.timer);
      if (!isError) {
        statusTip.timer = setTimeout(() => statusTip.classList.add('hide'), 3000);
      }
    }
  </script>
</body>
</html>
