<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>智能销售终端</title>
  <!-- Coze Web SDK 官方稳定版 -->
  <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.19/libs/cn/index.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: "Microsoft YaHei", sans-serif;
      background-color: #000;
    }

    /* 启动背景视频 */
    #bgVideo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      transition: opacity 0.8s ease;
    }
    .video-hide {
      opacity: 0;
      pointer-events: none;
    }

    /* Coze全屏容器 */
    #coze-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw !important;
      height: calc(100vh - 70px) !important; /* 底部留出手动语音按钮空间 */
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
      overflow: hidden;
    }
    .chat-show {
      opacity: 1 !important;
      pointer-events: auto !important;
    }

    /* 强制容器内元素全屏 */
    #coze-container > div,
    #coze-container > div > iframe,
    #coze-container .coze-chat-widget,
    #coze-container .coze-chat-wrap {
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
      top: 0 !important;
      left: 0 !important;
      border-radius: 0 !important;
      margin: 0 !important;
      transform: none !important;
    }

    /* 隐藏多余控件，保留输入框和播放按钮 */
    .coze-chat-header-close,
    .coze-chat-header-fullscreen,
    .coze-chat-asst-btn,
    .coze-chat-float-btn,
    .coze-chat-official-banner,
    .web_sdk_official_banner {
      display: none !important;
    }

    /* 首次启动引导遮罩 */
    #startMask {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.6);
      z-index: 999998;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #fff;
      font-size: 18px;
      backdrop-filter: blur(4px);
    }
    #startMask .tip-title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 12px;
    }
    #startMask .tip-desc {
      opacity: 0.8;
      margin-bottom: 30px;
      text-align: center;
      padding: 0 20px;
    }
    #startBtn {
      padding: 14px 40px;
      background: linear-gradient(135deg, #1890ff, #722ed1);
      border: none;
      border-radius: 30px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }

    /* 底部常驻手动语音按钮 - 全设备自适应 */
    #manualVoiceBar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100vw;
      height: 70px;
      background: #1a1a1a;
      border-top: 1px solid #333;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
    }
    #voiceBtn {
      width: 80%;
      max-width: 400px;
      height: 46px;
      border: none;
      border-radius: 23px;
      background: linear-gradient(135deg, #1890ff, #722ed1);
      color: #fff;
      font-size: 16px;
      font-weight: 500;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    #voiceBtn:active,
    #voiceBtn.recording {
      background: linear-gradient(135deg, #ff4d4f, #cf1322);
    }

    /* 状态提示条 - 最高层级 */
    #statusTip {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 24px;
      background: rgba(0,0,0,0.8);
      color: #fff;
      border-radius: 24px;
      font-size: 14px;
      z-index: 999999 !important;
      max-width: 90%;
      text-align: center;
      transition: opacity 0.3s;
      pointer-events: none;
      word-break: break-all;
    }
    .status-error {
      background: rgba(200, 0, 0, 0.85) !important;
    }
    .status-success {
      background: rgba(0, 150, 0, 0.85) !important;
    }
    .hide { opacity: 0; }
  </style>
</head>
<body>
  <!-- 启动加载视频 -->
  <video id="bgVideo" autoplay loop muted playsinline webkit-playsinline x5-playsinline x5-video-player-type="h5">
    <source src="./logo.mp4" type="video/mp4">

  <!-- 首次启动引导遮罩 -->

    <button id="voiceBtn">按住说话</button>
  </div>

  <script>
    /**************************
     * 配置区
     **************************/
    const CONFIG = {
      coze: {
        bot_id: '7649074341644353582',
        token: 'pat_o2eWHvjE458IrbwJD6493Cn1bHrlupzK2w0QLnaKb4QExB8rYHqfmSUJE6A0whI5'
      },
      xunfei: {
        app_id: '37492c96',
        api_key: '4377ec3322ec3acb7247e80f686d27c5',
        api_secret: 'MTY5NjZmMzgxNWVlMTgyNGI1MGNhODI4',
        host: 'iat-api.xfyun.cn',
        path: '/v2/iat',
        targetSampleRate: 16000
      },
      wake: {
        keywords: ['你好小玄', '你好小旋', '你好小璇', '你好小炫', '你好小选', '你好小轩'],
        coolDownTime: 6000,
        silenceTime: 1800,
        maxNoSpeakTime: 3000,
        cacheLength: 30
      }
    };

    /**************************
     * 全局状态变量
     **************************/
    let cozeClient = null;
    let ws = null;
    let mediaStream = null;
    let audioContext = null;
    let scriptProcessor = null;
    let isListening = false;
    let isConversing = false;
    let isManualMode = false; // 是否手动说话模式
    let silenceTimer = null;
    let noSpeakTimer = null;
    let finalText = '';
    let recognizeCache = '';
    let reconnectCount = 0;
    const maxReconnect = 3;
    const statusTip = document.getElementById('statusTip');
    const bgVideo = document.getElementById('bgVideo');
    const cozeContainer = document.getElementById('coze-container');
    const startMask = document.getElementById('startMask');
    const startBtn = document.getElementById('startBtn');
    const voiceBtn = document.getElementById('voiceBtn');
    const manualVoiceBar = document.getElementById('manualVoiceBar');

    /**************************
     * 加密工具 - 优化兼容性版本
     **************************/
    (function() {
      function utf8Encode(str) {
        return unescape(encodeURIComponent(str));
      }

      function sha256(message) {
        const msg = utf8Encode(message);
        const N = msg.length;
        const K = new Uint32Array([
          0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
          0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
          0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
          0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
          0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
          0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
          0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
          0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2
        ]);

        let h0=0x6a09e667, h1=0xbb67ae85, h2=0x3c6ef372, h3=0xa54ff53a;
        let h4=0x510e527f, h5=0x9b05688c, h6=0x1f83d9ab, h7=0x5be0cd19;

        const blocks = Math.ceil((N + 9) / 64);
        for (let block = 0; block < blocks; block++) {
          const w = new Uint32Array(64);
          for (let i = 0; i < 64; i++) {
            const pos = block * 64 + i;
            if (pos < N) w[i>>>2] |= msg.charCodeAt(pos) << (24 - (i%4)*8);
            else if (pos === N) w[i>>>2] |= 0x80 << (24 - (i%4)*8);
            else if (pos >= 56) {
              if (i === 62) w[i] = Math.floor(N * 8 / 0x100000000);
              if (i === 63) w[i] = (N * 8) >>> 0;
            }
          }
          for (let i = 16; i < 64; i++) {
            const s0 = (w[i-15]>>>7) ^ (w[i-15]>>>18) ^ (w[i-15]>>>3);
            const s1 = (w[i-2]>>>17) ^ (w[i-2]>>>19) ^ (w[i-2]>>>10);
            w[i] = (w[i-16] + s0 + w[i-7] + s1) >>> 0;
          }

          let a=h0, b=h1, c=h2, d=h3, e=h4, f=h5, g=h6, h=h7;
          for (let i = 0; i < 64; i++) {
            const S1 = (e>>>6) ^ (e>>>11) ^ (e>>>25);
            const ch = (e & f) ^ (~e & g);
            const temp1 = (h + S1 + ch + K[i] + w[i]) >>> 0;
            const S0 = (a>>>2) ^ (a>>>13) ^ (a>>>22);
            const maj = (a & b) ^ (a & c) ^ (b & c);
            const temp2 = (S0 + maj) >>> 0;
            h = g; g = f; f = e; e = (d + temp1) >>> 0;
            d = c; c = b; b = a; a = (temp1 + temp2) >>> 0;
          }
          h0=(h0+a)>>>0; h1=(h1+b)>>>0; h2=(h2+c)>>>0; h3=(h3+d)>>>0;
          h4=(h4+e)>>>0; h5=(h5+f)>>>0; h6=(h6+g)>>>0; h7=(h7+h)>>>0;
        }

        const hex = (n) => ('00000000' + n.toString(16)).slice(-8);
        return hex(h0)+hex(h1)+hex(h2)+hex(h3)+hex(h4)+hex(h5)+hex(h6)+hex(h7);
      }

      function hmacSha256(message, key) {
        const msg = utf8Encode(message);
        let k = utf8Encode(key);
        if (k.length > 64) k = sha256(k);
        const ipad = new Array(64), opad = new Array(64);
        for (let i = 0; i < 64; i++) {
          const c = i < k.length ? k.charCodeAt(i) : 0;
          ipad[i] = String.fromCharCode(c ^ 0x36);
          opad[i] = String.fromCharCode(c ^ 0x5c);
        }
        return sha256(opad.join('') + sha256(ipad.join('') + msg));
      }

      function base64Encode(str) {
        return btoa(unescape(encodeURIComponent(str)));
      }

      function hexToBase64(hex) {
        let bytes = '';
        for (let i = 0; i < hex.length; i += 2) {
          bytes += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
        }
        return btoa(bytes);
      }

      window.CryptoUtil = { hmacSha256, base64Encode, hexToBase64 };
    })();

    /**************************
     * 音频重采样
     **************************/
    function downsampleTo16k(inputData, inputSampleRate, targetSampleRate) {
      if (inputSampleRate === targetSampleRate) return inputData;
      const ratio = inputSampleRate / targetSampleRate;
      const outputLength = Math.floor(inputData.length / ratio);
      const output = new Float32Array(outputLength);
      for (let i = 0; i < outputLength; i++) output[i] = inputData[Math.floor(i * ratio)];
      return output;
    }

    /**************************
     * 讯飞鉴权URL生成 - 严格对齐官方规范
     **************************/
    function generateAuthUrl() {
      const date = new Date().toUTCString();
      const signStr = `host: ${CONFIG.xunfei.host}\ndate: ${date}\nGET ${CONFIG.xunfei.path} HTTP/1.1`;
      const signHex = CryptoUtil.hmacSha256(signStr, CONFIG.xunfei.api_secret);
      const signature = CryptoUtil.hexToBase64(signHex);
      
      const authOrigin = `api_key="${CONFIG.xunfei.api_key}", algorithm="hmac-sha256", headers="host date request-line", signature="${signature}"`;
      const authorization = CryptoUtil.base64Encode(authOrigin);
      
      return `wss://${CONFIG.xunfei.host}${CONFIG.xunfei.path}?authorization=${encodeURIComponent(authorization)}&date=${encodeURIComponent(date)}&host=${CONFIG.xunfei.host}`;
    }

    /**************************
     * 启动主流程
     **************************/
    window.addEventListener('load', async () => {
      // 播放启动视频
      bgVideo.muted = true;
      bgVideo.play().catch(() => {
        document.addEventListener('touchstart', () => bgVideo.play(), { once: true });
      });

      // 加载Coze
      await waitCozeSdkReady();
      showStatus('正在初始化聊天组件...');
      const cozeOk = await initCoze();
      if (!cozeOk) {
        showStatus('聊天组件初始化失败，请刷新重试', true, false);
        return;
      }

      showStatus('点击按钮启动语音服务', false, false);
    });

    // 点击启动语音服务
    startBtn.addEventListener('click', async () => {
      startMask.style.display = 'none';
      manualVoiceBar.style.display = 'flex';
      await startWakeUpListen();
    });

    // 手动语音按钮事件
    const startManualRecord = (e) => {
      e.preventDefault();
      if (!isListening) return;
      isManualMode = true;
      isConversing = true;
      finalText = '';
      recognizeCache = '';
      voiceBtn.classList.add('recording');
      voiceBtn.textContent = '松开结束说话';
      clearTimeout(silenceTimer);
    };

    const endManualRecord = (e) => {
      e.preventDefault();
      if (!isManualMode) return;
      voiceBtn.classList.remove('recording');
      voiceBtn.textContent = '按住说话';
      
      if (finalText.trim() && cozeClient) {
        cozeClient.sendMessage({
          content: finalText.trim(),
          contentType: 'text'
        });
      }

      isManualMode = false;
      isConversing = false;
      finalText = '';
      recognizeCache = '';

      // 重启唤醒监听
      stopWakeUpListen();
      setTimeout(() => startWakeUpListen(), 500);
    };

    voiceBtn.addEventListener('mousedown', startManualRecord);
    voiceBtn.addEventListener('mouseup', endManualRecord);
    voiceBtn.addEventListener('mouseleave', endManualRecord);
    voiceBtn.addEventListener('touchstart', startManualRecord, { passive: false });
    voiceBtn.addEventListener('touchend', endManualRecord, { passive: false });

    // 页面可见性恢复
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && audioContext && audioContext.state === 'suspended') {
        audioContext.resume();
      }
    });

    function waitCozeSdkReady() {
      return new Promise(resolve => {
        let count = 0;
        const timer = setInterval(() => {
          count++;
          if (typeof CozeWebSDK !== 'undefined') {
            clearInterval(timer);
            resolve(true);
          }
          if (count > 60) {
            clearInterval(timer);
            resolve(false);
          }
        }, 500);
      });
    }

    /**************************
     * Coze 初始化
     **************************/
    function initCoze() {
      return new Promise(resolve => {
        try {
          cozeClient = new CozeWebSDK.WebChatClient({
            config: {
              bot_id: CONFIG.coze.bot_id,
              isIframe: false,
            },
            auth: {
              type: 'token',
              token: CONFIG.coze.token,
              onRefreshToken: () => Promise.resolve(CONFIG.coze.token)
            },
            ui: {
              base: {
                layout: 'mobile',
                zIndex: 10,
                lang: 'zh-CN'
              },
              header: {
                isShow: true,
                isNeedClose: false
              },
              asstBtn: {
                isNeed: false
              },
              chatBot: {
                title: '智能销售助手',
                el: cozeContainer,
                width: '100%',
                height: '100%'
              }
            },
            onLoad: () => {
              setTimeout(() => {
                cozeClient.showChatBot();
                cozeContainer.classList.add('chat-show');
                bgVideo.classList.add('video-hide');
                resolve(true);
              }, 500);
            },
            onMessage: (msg) => {
              if (msg.is_success && !msg.is_from_self) {
                setTimeout(() => autoPlayVoice(), 800);
              }
            },
            onError: (err) => {
              console.error('Coze错误:', err);
              resolve(false);
            }
          });

          setTimeout(() => {
            if (cozeClient?.showChatBot) {
              cozeClient.showChatBot();
              cozeContainer.classList.add('chat-show');
              bgVideo.classList.add('video-hide');
            }
          }, 5000);

        } catch (e) {
          console.error('Coze初始化异常:', e);
          resolve(false);
        }
      });
    }

    // 自动播放回复语音
    function autoPlayVoice() {
      try {
        const voiceBtns = document.querySelectorAll('#coze-container .coze-chat-message-voice-play, #coze-container button[aria-label="播放语音"]');
        if (voiceBtns.length > 0) {
          voiceBtns[voiceBtns.length - 1].click();
        }
      } catch (e) {
        console.log('自动播放语音失败:', e);
      }
    }

    /**************************
     * 音频采集
     **************************/
    async function startAudioCapture() {
      try {
        if (!navigator.mediaDevices?.getUserMedia) throw new Error('当前浏览器不支持语音功能');
        
        mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            channelCount: 1,
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });

        const track = mediaStream.getAudioTracks()[0];
        const actualSampleRate = track.getSettings().sampleRate || 48000;
        
        audioContext = new (window.AudioContext || window.webkitAudioContext)({
          sampleRate: actualSampleRate
        });
        if (audioContext.state === 'suspended') await audioContext.resume();

        const source = audioContext.createMediaStreamSource(mediaStream);
        scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);
        source.connect(scriptProcessor);
        scriptProcessor.connect(audioContext.destination);

        scriptProcessor.onaudioprocess = (e) => {
          if (!isListening || ws?.readyState !== WebSocket.OPEN) return;
          const inputData = e.inputBuffer.getChannelData(0);
          const resampled = downsampleTo16k(inputData, actualSampleRate, CONFIG.xunfei.targetSampleRate);
          const pcmData = floatTo16BitPCM(resampled);
          const base64 = arrayBufferToBase64(pcmData.buffer);
          sendAudioFrame(base64);
        };
        return true;
      } catch (err) {
        console.error('麦克风采集失败:', err);
        let msg = err.message;
        if (err.name === 'NotAllowedError') msg = '麦克风权限被拒绝，请在设置中允许';
        if (err.name === 'NotFoundError') msg = '未检测到麦克风设备';
        if (err.name === 'NotSupportedError') msg = '当前浏览器不支持语音采集';
        showStatus('麦克风启动失败：' + msg, true, false);
        return false;
      }
    }

    function floatTo16BitPCM(input) {
      const output = new Int16Array(input.length);
      for (let i = 0; i < input.length; i++) {
        const s = Math.max(-1, Math.min(1, input[i]));
        output[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      return output;
    }

    function arrayBufferToBase64(buffer) {
      let binary = '';
      const bytes = new Uint8Array(buffer);
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary);
    }

    /**************************
     * 讯飞WebSocket连接 + 详细错误提示
     **************************/
    function connectXunfei() {
      try {
        const wsUrl = generateAuthUrl();
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
          // 连接建立立即发送首帧，避免超时断开
          sendFirstFrame();
          isListening = true;
          reconnectCount = 0;
          recognizeCache = '';
          showStatus('语音监听已启动，说「你好小玄」唤醒我', false, false);
        };

        ws.onmessage = (event) => {
          try {
            const res = JSON.parse(event.data);
            if (res.code !== 0) {
              // 显示具体错误码和原因
              const errMsg = `识别错误(${res.code})：${res.message}`;
              showStatus(errMsg, true, false);
              console.error('讯飞识别错误:', res);
              return;
            }
            if (res.data?.result?.ws) {
              let text = '';
              res.data.result.ws.forEach(item => text += item.cw[0].w);
              
              recognizeCache += text;
              if (recognizeCache.length > CONFIG.wake.cacheLength) {
                recognizeCache = recognizeCache.slice(-CONFIG.wake.cacheLength);
              }

              handleRecognitionResult(recognizeCache);
            }
          } catch (e) {
            console.error('解析结果失败:', e);
          }
        };

        ws.onerror = (event) => {
          console.error('WebSocket错误:', event);
          showStatus('语音连接异常，正在重连...', true, false);
        };

        ws.onclose = (event) => {
          isListening = false;
          console.log('WebSocket关闭，code:', event.code, 'reason:', event.reason);
          
          // 显示具体断开原因
          if (event.code !== 1000 && event.code !== 1005) {
            showStatus(`连接断开(${event.code})：${event.reason || '鉴权失败，请检查密钥'}`, true, false);
          }

          // 非手动断开且未达最大重连次数则重连
          if (!isConversing && !isManualMode && reconnectCount < maxReconnect) {
            reconnectCount++;
            setTimeout(() => startWakeUpListen(), 2000);
          }
        };
      } catch (e) {
        console.error('连接讯飞失败:', e);
        showStatus('语音服务连接失败：' + e.message, true, false);
      }
    }

    function sendFirstFrame() {
      ws.send(JSON.stringify({
        common: { app_id: CONFIG.xunfei.app_id },
        business: {
          language: 'zh_cn',
          domain: 'iat',
          accent: 'mandarin',
          vad_eos: 2000,
          punc: 0
        },
        data: { status: 0, format: 'audio/L16;rate=16000', audio: '', encoding: 'raw' }
      }));
    }

    function sendAudioFrame(audioBase64) {
      ws.send(JSON.stringify({
        data: { status: 1, format: 'audio/L16;rate=16000', audio: audioBase64, encoding: 'raw' }
      }));
    }

    function sendEndFrame() {
      if (ws?.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ data: { status: 2, audio: '' } }));
      }
    }

    /**************************
     * 唤醒 + 对话逻辑
     **************************/
    function handleRecognitionResult(cacheText) {
      // 手动说话模式不触发唤醒
      if (isManualMode) {
        finalText = cacheText;
        return;
      }

      // 对话模式
      if (isConversing) {
        finalText = cacheText;
        clearTimeout(silenceTimer);
        silenceTimer = setTimeout(sendUserMessage, CONFIG.wake.silenceTime);
        return;
      }

      // 待唤醒模式
      const match = CONFIG.wake.keywords.some(keyword => cacheText.includes(keyword));
      if (match) wakeUpSuccess();
    }

    function wakeUpSuccess() {
      isConversing = true;
      finalText = '';
      recognizeCache = '';
      showStatus('我在呢，请说话~', false, true);
      clearTimeout(noSpeakTimer);
      noSpeakTimer = setTimeout(endConversation, CONFIG.wake.maxNoSpeakTime);
    }

    function sendUserMessage() {
      clearTimeout(silenceTimer);
      clearTimeout(noSpeakTimer);
      
      if (finalText.trim() && cozeClient) {
        cozeClient.sendMessage({
          content: finalText.trim(),
          contentType: 'text'
        });
        finalText = '';
      }

      setTimeout(endConversation, CONFIG.wake.coolDownTime);
    }

    function endConversation() {
      clearTimeout(silenceTimer);
      clearTimeout(noSpeakTimer);
      isConversing = false;
      finalText = '';
      recognizeCache = '';
      
      stopWakeUpListen();
      setTimeout(() => {
        startWakeUpListen();
        showStatus('等待唤醒，说「你好小玄」', false, false);
      }, 500);
    }

    /**************************
     * 启停 + 资源释放
     **************************/
    async function startWakeUpListen() {
      if (isListening) return;
      showStatus('正在启动语音监听...');
      const ok = await startAudioCapture();
      if (ok) connectXunfei();
    }

    function stopWakeUpListen() {
      isListening = false;
      if (ws) { sendEndFrame(); ws.close(); ws = null; }
      if (mediaStream) {
        mediaStream.getAudioTracks().forEach(track => {
          track.stop();
          mediaStream.removeTrack(track);
        });
        mediaStream = null;
      }
      if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor = null; }
      if (audioContext) { audioContext.close(); audioContext = null; }
    }

    /**************************
     * 工具函数
     **************************/
    function showStatus(text, isError = false, autoHide = false) {
      statusTip.textContent = text;
      statusTip.classList.remove('hide');
      statusTip.classList.toggle('status-error', isError);
      statusTip.classList.toggle('status-success', !isError);
      clearTimeout(statusTip.timer);
      if (autoHide) {
        statusTip.timer = setTimeout(() => statusTip.classList.add('hide'), 3000);
      }
    }
  </script>
</body>
</html>
